kind = "directory"
mode = "open"
required = [
  "contract.ts",
  "index.ts",
  "strategies",
]

[[scopes]]
name = "ecology-op-rules-entrypoints"
root = "mods/mod-swooper-maps/src/domain/ecology/ops/*/rules"
kind = "directory"
mode = "open"
required = [
  "index.ts",
]

[[scopes]]
name = "ecology-op-strategy-entrypoints"
root = "mods/mod-swooper-maps/src/domain/ecology/ops/*/strategies"
kind = "directory"
mode = "open"
required = [
  "index.ts",
]
