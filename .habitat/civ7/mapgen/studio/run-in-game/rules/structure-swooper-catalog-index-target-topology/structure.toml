schemaVersion = 1

[[scopes]]
name = "swooper-catalog-index-source-files"
root = "mods/mod-swooper-maps/src/maps/catalog"
kind = "directory"
mode = "open"
required = [
  "index.ts",
  "sourceIndex.ts",
  "sources.ts",
]

[[scopes]]
name = "swooper-catalog-generation-scripts"
root = "mods/mod-swooper-maps/scripts"
kind = "directory"
mode = "open"
required = [
  "generate-map-artifacts.ts",
  "generate-studio-map-catalog.ts",
]

[[scopes]]
name = "retired-catalog-index-transitional-advisory"
root = ".habitat/civ7/mapgen/studio/run-in-game/rules"
kind = "directory"
mode = "open"
forbidden = [
  "grit-swooper-catalog-index-consistency-temporary",
]
