name: Habitat Standalone Check Binary

on:
  push:
    tags:
      - "habitat-sdk-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: habitat-standalone-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-prove-darwin-candidate:
    name: Build and prove temporary Darwin candidate
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Provision pinned Bun 1.4 compiler
        run: |
          toolchain_root="$(bun run --cwd tools/habitat provision:standalone:compiler --output "$RUNNER_TEMP/habitat-standalone-compiler")"
          printf 'HABITAT_STANDALONE_BUN_TOOLCHAIN=%s\n' "$toolchain_root" >> "$GITHUB_ENV"

      - name: Run required release ratchet
        run: bunx nx run habitat:release:standalone

      - name: Upload candidate release assets
        uses: actions/upload-artifact@v4
        with:
          name: habitat-standalone-candidate-${{ github.sha }}
          if-no-files-found: error
          path: |
            tools/habitat/dist/standalone/habitat-sdk-darwin-arm64
            tools/habitat/dist/standalone/provenance.json
            tools/habitat/dist/standalone/SHA256SUMS

  publish-release-assets:
    name: Publish exact proven release assets
    needs: build-and-prove-darwin-candidate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/habitat-sdk-v')
    runs-on: macos-14
    steps:
      - name: Checkout publication owner
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download proven candidate release assets
        uses: actions/download-artifact@v4
        with:
          name: habitat-standalone-candidate-${{ github.sha }}
          path: release

      - name: Verify proven candidate checksums
        run: shasum -a 256 -c SHA256SUMS
        working-directory: release

      - name: Publish or prove immutable tag release
        env:
          EXPECTED_SOURCE_COMMIT: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: tools/habitat/scripts/standalone/publish-release.sh release
