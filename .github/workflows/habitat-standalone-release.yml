name: Habitat Standalone Check Binary

on:
  push:
    tags:
      - "habitat-sdk-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: habitat-standalone-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prove-host-binary:
    name: Execute moved binary on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prove moved standalone binaries
        run: bunx nx run habitat:test:standalone

  release-assets:
    name: Build proven release assets
    needs: prove-host-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run required release ratchet
        run: bunx nx run habitat:release:standalone

      - name: Upload proven workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: habitat-standalone-${{ github.sha }}
          if-no-files-found: error
          path: |
            tools/habitat/dist/standalone/habitat-sdk-darwin-arm64
            tools/habitat/dist/standalone/habitat-sdk-linux-x64-baseline
            tools/habitat/dist/standalone/provenance.json
            tools/habitat/dist/standalone/SHA256SUMS

      - name: Publish immutable tag release
        if: startsWith(github.ref, 'refs/tags/habitat-sdk-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            tools/habitat/dist/standalone/habitat-sdk-darwin-arm64 \
            tools/habitat/dist/standalone/habitat-sdk-linux-x64-baseline \
            tools/habitat/dist/standalone/provenance.json \
            tools/habitat/dist/standalone/SHA256SUMS \
            --verify-tag \
            --generate-notes
