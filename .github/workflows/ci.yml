name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Guard against pnpm artifacts
        shell: bash
        run: |
          set -euo pipefail
          if find . -name pnpm-lock.yaml -o -name pnpm-workspace.yaml | grep -q .; then
            echo "pnpm artifacts detected (repo contract is Bun-only):"
            find . -name pnpm-lock.yaml -o -name pnpm-workspace.yaml
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('bun.lock', 'nx.json', 'packages/*/package.json', 'packages/plugins/*/package.json', 'apps/*/package.json', 'mods/*/package.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: CI graph
        run: bun run ci

  architecture-strict-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Guard against pnpm artifacts
        shell: bash
        run: |
          set -euo pipefail
          if find . -name pnpm-lock.yaml -o -name pnpm-workspace.yaml | grep -q .; then
            echo "pnpm artifacts detected (repo contract is Bun-only):"
            find . -name pnpm-lock.yaml -o -name pnpm-workspace.yaml
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('bun.lock', 'nx.json', 'packages/*/package.json', 'packages/plugins/*/package.json', 'apps/*/package.json', 'mods/*/package.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Architecture strict-core graph
        run: bun run ci:architecture-strict-core

      - name: Habitat JSON diagnostics
        if: always()
        run: bun habitat check --json --output habitat-diagnostics.json

      - name: Upload habitat diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: habitat-diagnostics
          path: habitat-diagnostics.json
          if-no-files-found: ignore
