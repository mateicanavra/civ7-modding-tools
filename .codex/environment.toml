version = 1
name = "Civ7 Modding Tools"

[setup]
script = '''set -euo pipefail
git submodule update --init --recursive -- .civ7/outputs/resources
bun run resources:init
bun install --frozen-lockfile
./node_modules/.bin/tsc -p tools/habitat/tsconfig.json
bun run build
'''

[cleanup]
script = "bash scripts/codex/manage-mapgen-studio.sh stop"

[[actions]]
name = "Rebuild workspace"
icon = "tool"
command = "bun run build"

[[actions]]
name = "Sync resources snapshot"
icon = "tool"
command = "bun run resources:init"

[[actions]]
name = "Inspect resources snapshot"
icon = "tool"
command = "bun run resources:status"

[[actions]]
name = "Refresh game resources"
icon = "run"
command = "bun run refresh:data"
platform = "darwin"

[[actions]]
name = "Publish resources snapshot"
icon = "run"
command = "bun run resources:publish"

[[actions]]
name = "Serve Docs"
icon = "run"
command = "nx run civ7-docs:dev"

[[actions]]
name = "Build Playground"
icon = "run"
command = "nx run civ7-playground:build"

[[actions]]
name = "Start isolated MapGen Studio"
icon = "run"
command = "bash scripts/codex/manage-mapgen-studio.sh start"
platform = "darwin"

[[actions]]
name = "Stop isolated MapGen Studio"
icon = "tool"
command = "bash scripts/codex/manage-mapgen-studio.sh stop"
platform = "darwin"

[[actions]]
name = "Build standard MapGen visualization"
icon = "debug"
command = "nx run mod-swooper-maps:viz:standard"

[[actions]]
name = "Build MapGen diagnostic dump"
icon = "debug"
command = "nx run mod-swooper-maps:diag:dump"

[[actions]]
name = "Deploy Swooper Maps"
icon = "run"
command = "nx run mod-swooper-maps:deploy"
platform = "darwin"

[[actions]]
name = "Probe Civ7 Tuner"
icon = "test"
command = "nx run civ7-cli:build && node packages/cli/bin/run.js game health --tuner --json"
platform = "darwin"
